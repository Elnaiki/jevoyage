<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
    <title>JeVoyage - Bus Travel</title>
    <meta name="description" content="Visualisez les voyages des agences de bus au Cameroun" />

    <!-- PWA -->
    <meta name="theme-color" content="#1C3A5A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JeVoyage" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Android -->
    <meta name="application-name" content="JeVoyage" />
    <meta name="msapplication-TileColor" content="#1C3A5A" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Safe area for notch devices -->
    <style>
      body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    </style>

    <meta property="og:image" content="https://bolt.new/static/og_default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
